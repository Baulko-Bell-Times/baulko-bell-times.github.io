<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baulko Bell Times</title>
    
    <!-- SEO Search Optimization Tags -->
    <meta name="description" content="Check the live bell times, schedules, and countdowns for Baulkham Hills High School. Custom daily timetables that work offline with quiet alerts!">
    <meta name="keywords" content="Baulko, Baulkham Hills High School, Baulko bell times, BHHS, school timetable, bell times tracker, Jayden Cho">
    <meta name="robots" content="index, follow">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#000000',
                        darkText: '#ffffff',
                        lightBg: '#ffffff',
                        lightText: '#000000'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .schedule-table th, .schedule-table td {
            border: 1px solid currentColor;
            padding: 16px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        /* Highlight row representing the active period */
        .active-period {
            background-color: rgba(59, 130, 246, 0.25); 
            font-weight: bold;
        }

        .dark .active-period {
            background-color: rgba(59, 130, 246, 0.45);
        }
        
        /* Custom checkbox style */
        .task-checkbox:checked + span {
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-lightBg text-lightText dark:bg-darkBg dark:text-darkText min-h-screen font-sans flex flex-col items-center p-4">

    <!-- Header & App Controls -->
    <div class="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div>
            <h1 class="text-3xl font-bold">Baulko Bell Times</h1>
        </div>
        
        <div class="flex flex-wrap items-center justify-center gap-4 bg-gray-200 dark:bg-gray-800 p-3 rounded-lg">
            <button id="theme-toggle" class="p-2 bg-gray-300 dark:bg-gray-700 rounded hover:bg-gray-400 transition text-sm">
                Toggle Theme
            </button>
            
            <div class="flex items-center gap-2 border-l border-gray-400 pl-4">
                <label for="warning-mins" class="text-sm">Warning (mins):</label>
                <input type="number" id="warning-mins" value="5" min="1" max="60" class="w-16 p-1 text-black rounded text-center">
                <button id="notify-btn" class="p-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm">
                    Enable Alerts
                </button>
            </div>
        </div>
    </div>

    <!-- ALWAYS-ON GLOBAL CLOCK -->
    <div class="w-full max-w-4xl text-center mt-2 mb-6 bg-gray-100 dark:bg-zinc-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-zinc-800">
        <div id="current-date" class="text-lg font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">
            Loading Date...
        </div>
        <h2 class="text-5xl md:text-6xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">
            <span id="current-time" class="font-mono">--:--:--</span>
        </h2>
    </div>

    <!-- Active Timer Status Display -->
    <div id="status-container" class="w-full max-w-4xl text-center mb-6">
        <!-- Holiday Indicator Banner -->
        <div id="holiday-message" class="hidden text-2xl font-bold text-red-500 mb-4 border-2 border-red-500 p-4 rounded-lg bg-red-500/10">
            🎉 School Holidays! No active bells today. 🎉
            <div class="text-sm font-normal text-gray-500 dark:text-gray-400 mt-2">Term 3 starts Tuesday, 21 July.</div>
        </div>
        
        <!-- Weekend Indicator Banner -->
        <div id="weekend-message" class="hidden text-2xl font-bold text-yellow-500 mb-4 border-2 border-yellow-500 p-4 rounded-lg bg-yellow-500/10">
            Weekend! Enjoy your break. 🏖️
        </div>

        <!-- School Countdown Panel -->
        <div id="active-timer" class="flex flex-col items-center w-full">
            <div id="schedule-type-badge" class="mb-2 px-4 py-1.5 bg-blue-200 text-blue-900 dark:bg-blue-900 dark:text-blue-100 rounded-full text-sm font-bold tracking-wide uppercase">
                Loading Schedule...
            </div>
            
            <div class="text-5xl md:text-6xl font-black text-gray-800 dark:text-gray-100 mt-4 mb-2 tracking-tight" id="countdown-display">
                --:-- remaining
            </div>
            
            <!-- FEATURE 2: Animated Progress Bar -->
            <div id="progress-container" class="w-full max-w-md bg-gray-200 dark:bg-zinc-800 rounded-full h-3 mb-4 hidden overflow-hidden shadow-inner border border-gray-300 dark:border-zinc-700">
                <div id="progress-bar" class="bg-green-500 h-3 rounded-full transition-all duration-1000 ease-linear" style="width: 100%"></div>
            </div>

            <p class="text-2xl font-medium text-gray-600 dark:text-gray-300" id="current-period-text">Waiting for schedule...</p>
        </div>
    </div>

    <!-- Schedule Weekly Viewer Tabs -->
    <div class="w-full max-w-4xl mb-2">
        <div class="flex justify-between items-end mb-2">
            <div class="text-sm font-semibold text-gray-500">View Weekly Timetables:</div>
            <div id="mini-status" class="text-xs md:text-sm font-bold text-blue-600 dark:text-blue-400 hidden">
                --:-- • --m left
            </div>
        </div>
        <div class="grid grid-cols-5 gap-1">
            <button onclick="switchViewDay(1)" id="tab-1" class="py-2 text-xs md:text-sm font-bold rounded-t-lg bg-gray-200 dark:bg-gray-800">Mon</button>
            <button onclick="switchViewDay(2)" id="tab-2" class="py-2 text-xs md:text-sm font-bold rounded-t-lg bg-gray-200 dark:bg-gray-800">Tue</button>
            <button onclick="switchViewDay(3)" id="tab-3" class="py-2 text-xs md:text-sm font-bold rounded-t-lg bg-gray-200 dark:bg-gray-800">Wed</button>
            <button onclick="switchViewDay(4)" id="tab-4" class="py-2 text-xs md:text-sm font-bold rounded-t-lg bg-gray-200 dark:bg-gray-800">Thu</button>
            <button onclick="switchViewDay(5)" id="tab-5" class="py-2 text-xs md:text-sm font-bold rounded-t-lg bg-gray-200 dark:bg-gray-800">Fri</button>
        </div>
    </div>

    <!-- The Schedule Table -->
    <div class="w-full max-w-4xl overflow-x-auto bg-white dark:bg-black rounded-b-xl border border-gray-300 dark:border-zinc-800 shadow-sm">
        <table class="schedule-table" id="schedule-table">
            <tbody id="schedule-body">
                <!-- Rows injected dynamically via JS -->
            </tbody>
        </table>
    </div>

    <!-- FEATURE 5: Homework & Task Quick-List -->
    <div class="w-full max-w-4xl mt-6 bg-white dark:bg-zinc-900 rounded-xl p-5 border border-gray-300 dark:border-zinc-800 shadow-sm text-left">
        <h3 class="text-lg font-bold mb-3 flex items-center gap-2">Homework & Tasks 📝</h3>
        <div class="flex gap-2 mb-4">
            <input type="text" id="task-input" placeholder="E.g., Maths chapter 3 review" class="flex-1 p-2 rounded border border-gray-300 dark:border-zinc-700 dark:bg-black dark:text-white focus:outline-none focus:border-blue-500">
            <button id="add-task-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded transition-colors">Add</button>
        </div>
        <ul id="task-list" class="space-y-2">
            <!-- Tasks injected via JS -->
        </ul>
    </div>

    <!-- Footer -->
    <div class="mt-8 mb-4 text-xs text-center text-gray-500 dark:text-gray-500">
        Made by Jayden Cho
    </div>

    <script>
        // --- 1. DETAILED SCHEDULE DATA ---
        const tuesdayThursdaySchedule = [
            { id: "start", name: "Start", start: "08:38", end: "08:38", isPoint: true },
            { id: "rc", name: "Roll Call", start: "08:38", end: "08:44" },
            { id: "p1", name: "Period 1", start: "08:44", end: "09:26" },
            { id: "p2", name: "Period 2", start: "09:26", end: "10:06" },
            { id: "recess", name: "Recess", start: "10:06", end: "10:25" },
            { id: "p3", name: "Period 3", start: "10:25", end: "11:05" },
            { id: "p4", name: "Period 4", start: "11:05", end: "11:45" },
            { id: "break", name: "Break", start: "11:45", end: "11:50" },
            { id: "p5", name: "Period 5", start: "11:50", end: "12:30" },
            { id: "p6", name: "Period 6", start: "12:30", end: "13:10" },
            { id: "lunch", name: "Lunch", start: "13:10", end: "13:46" },
            { id: "p7", name: "Period 7", start: "13:46", end: "14:26" },
            { id: "p8", name: "Period 8", start: "14:26", end: "15:06" },
            { id: "end", name: "End", start: "15:06", end: "15:06", isPoint: true }
        ];

        const schedules = {
            1: { // Monday
                name: "Monday (Assembly)",
                data: [
                    { id: "start", name: "Start", start: "08:38", end: "08:38", isPoint: true },
                    { id: "rc", name: "Roll Call", start: "08:38", end: "08:44" },
                    { id: "p1", name: "Period 1", start: "08:44", end: "09:23" },
                    { id: "p2", name: "Period 2", start: "09:23", end: "10:00" },
                    { id: "assembly", name: "Assembly", start: "10:00", end: "10:24" },
                    { id: "recess", name: "Recess", start: "10:24", end: "10:43" },
                    { id: "p3", name: "Period 3", start: "10:43", end: "11:20" },
                    { id: "p4", name: "Period 4", start: "11:20", end: "11:57" },
                    { id: "break", name: "Break", start: "11:57", end: "12:02" },
                    { id: "p5", name: "Period 5", start: "12:02", end: "12:39" },
                    { id: "p6", name: "Period 6", start: "12:39", end: "13:16" },
                    { id: "lunch", name: "Lunch", start: "13:16", end: "13:52" },
                    { id: "p7", name: "Period 7", start: "13:52", end: "14:29" },
                    { id: "p8", name: "Period 8", start: "14:29", end: "15:06" },
                    { id: "end", name: "End", start: "15:06", end: "15:06", isPoint: true }
                ]
            },
            2: { // Tuesday
                name: "Tuesday Schedule",
                data: tuesdayThursdaySchedule
            },
            3: { // Wednesday
                name: "Wednesday (Sport)",
                data: [
                    { id: "start", name: "Start", start: "08:38", end: "08:38", isPoint: true },
                    { id: "rc", name: "Roll Call", start: "08:38", end: "08:44" },
                    { id: "p1", name: "Period 1", start: "08:44", end: "09:23" },
                    { id: "p2", name: "Period 2", start: "09:23", end: "10:00" },
                    { id: "recess", name: "Recess", start: "10:00", end: "10:15" },
                    { id: "p3", name: "Period 3", start: "10:15", end: "10:52" },
                    { id: "p4", name: "Period 4", start: "10:52", end: "11:29" },
                    { id: "p5", name: "Period 5", start: "11:29", end: "12:06" },
                    { id: "lunch", name: "Lunch", start: "12:06", end: "12:39" },
                    { id: "sport", name: "Sport / Period 6", start: "12:39", end: "13:16" },
                    { id: "p7", name: "Period 7", start: "13:16", end: "13:53" },
                    { id: "p8", name: "Period 8", start: "13:53", end: "14:30" },
                    { id: "end", name: "End", start: "14:30", end: "14:30", isPoint: true }
                ]
            },
            4: { // Thursday
                name: "Thursday Schedule",
                data: tuesdayThursdaySchedule
            },
            5: { // Friday
                name: "Friday Schedule",
                data: [
                    { id: "start", name: "Start", start: "08:38", end: "08:38", isPoint: true },
                    { id: "rc", name: "Roll Call", start: "08:38", end: "08:44" },
                    { id: "p1", name: "Period 1", start: "08:44", end: "09:26" },
                    { id: "p2", name: "Period 2", start: "09:26", end: "10:05" },
                    { id: "recess", name: "Recess", start: "10:05", end: "10:30" },
                    { id: "p3", name: "Period 3", start: "10:30", end: "11:09" },
                    { id: "p4", name: "Period 4", start: "11:09", end: "11:48" },
                    { id: "break", name: "Break", start: "11:48", end: "11:53" },
                    { id: "p5", name: "Period 5", start: "11:53", end: "12:32" },
                    { id: "p6", name: "Period 6", start: "12:32", end: "13:11" },
                    { id: "lunch", name: "Lunch", start: "13:11", end: "13:47" },
                    { id: "p7", name: "Period 7", start: "13:47", end: "14:27" },
                    { id: "p8", name: "Period 8", start: "14:27", end: "15:06" },
                    { id: "end", name: "End", start: "15:06", end: "15:06", isPoint: true }
                ]
            }
        };

        // GLOBAL STATE
        let currentViewingDay = null; 
        let notificationsEnabled = false;
        let lastNotifiedPeriod = null;
        let tasks = JSON.parse(localStorage.getItem('baulko_tasks')) || []; // Load homework tasks

        // --- 2. DYNAMIC TABLE BUILDER ---
        function renderTable(dayId) {
            let activeSchedule;
            if (schedules[dayId] && schedules[dayId].data) {
                activeSchedule = schedules[dayId].data;
            } else {
                activeSchedule = schedules[2].data; // Default to normal day
            }
            
            const tbody = document.getElementById('schedule-body');
            if (!tbody) return;
            
            tbody.innerHTML = ''; 
            
            const headerTr = document.createElement('tr');
            headerTr.className = "bg-gray-100 dark:bg-zinc-900 font-bold";
            const th1 = document.createElement('td'); th1.textContent = "Period / Activity";
            const th2 = document.createElement('td'); th2.textContent = "Time Range";
            headerTr.appendChild(th1); headerTr.appendChild(th2);
            tbody.appendChild(headerTr);

            activeSchedule.forEach(function(period) {
                const tr = document.createElement('tr');
                tr.id = 'row-' + period.id;
                
                // FEATURE 1: Fetch Custom Personalized Name
                const customName = localStorage.getItem('custom_subject_' + period.id) || period.name;

                const nameTd = document.createElement('td');
                nameTd.className = "font-medium";
                
                // Wrapper to keep text and edit button aligned
                const nameWrapper = document.createElement('div');
                nameWrapper.className = "flex items-center justify-center gap-2";
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = customName;
                nameWrapper.appendChild(nameSpan);

                // FEATURE 1: Edit Button for Personalization
                if (!period.isPoint) {
                    const editBtn = document.createElement('button');
                    editBtn.innerHTML = "✏️";
                    editBtn.className = "text-[0.65rem] opacity-30 hover:opacity-100 transition-opacity bg-gray-200 dark:bg-zinc-800 rounded-full px-1.5 py-0.5 ml-1";
                    editBtn.title = "Customize Subject Name";
                    editBtn.onclick = function() {
                        const newName = prompt("Enter a custom name (e.g., 'Maths - Room 204'). \nLeave completely blank to reset to default:", customName !== period.name ? customName : "");
                        if (newName !== null) {
                            if (newName.trim() === "") {
                                localStorage.removeItem('custom_subject_' + period.id);
                            } else {
                                localStorage.setItem('custom_subject_' + period.id, newName.trim());
                            }
                            renderTable(currentViewingDay);
                            updateClock(); // Immediately apply changes to the live countdown
                        }
                    };
                    nameWrapper.appendChild(editBtn);
                }
                
                nameTd.appendChild(nameWrapper);

                const timeTd = document.createElement('td');
                timeTd.className = "font-mono";
                if (period.isPoint) {
                    timeTd.textContent = formatToAMPM(period.start);
                } else {
                    timeTd.textContent = formatToAMPM(period.start) + ' - ' + formatToAMPM(period.end);
                }
                
                tr.appendChild(nameTd);
                tr.appendChild(timeTd);
                tbody.appendChild(tr);
            });

            // Update Tab active styling
            for (let i = 1; i <= 5; i++) {
                const tab = document.getElementById('tab-' + i);
                if (tab) {
                    if (i === dayId) {
                        tab.className = "py-2 text-xs md:text-sm font-bold rounded-t-lg bg-blue-600 text-white border-b-2 border-blue-600";
                    } else {
                        tab.className = "py-2 text-xs md:text-sm font-bold rounded-t-lg bg-gray-200 dark:bg-zinc-800 border-b-2 border-transparent hover:bg-gray-300 dark:hover:bg-zinc-700";
                    }
                }
            }

            currentViewingDay = dayId;
        }

        window.switchViewDay = function(dayId) {
            renderTable(dayId);
            updateClock();
        };

        function formatToAMPM(time24) {
            let parts = time24.split(':');
            let hours = Number(parts[0]);
            let minutes = Number(parts[1]);
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const strMinutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + strMinutes + ampm;
        }

        // --- 3. TIME & HOLIDAY LOGIC ---
        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        const terms = [
            { start: parseDate('2026-07-21'), end: parseDate('2026-09-25') }, 
            { start: parseDate('2026-10-13'), end: parseDate('2026-12-17') }  
        ];

        function isSchoolHoliday(date) {
            const checkDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            for (let i = 0; i < terms.length; i++) {
                if (checkDate >= terms[i].start && checkDate <= terms[i].end) {
                    return false; 
                }
            }
            return true;
        }

        function parseTime(timeStr, targetDate) {
            const parts = timeStr.split(':');
            const d = new Date(targetDate);
            d.setHours(Number(parts[0]), Number(parts[1]), 0, 0);
            return d;
        }

        function triggerNotification(periodName, minutesLeft) {
            if (!notificationsEnabled) return;

            new Notification("Class ending soon!", {
                body: "Only " + minutesLeft + " minutes left in " + periodName + "!",
                icon: "https://cdn-icons-png.flaticon.com/512/3602/3602145.png"
            });
        }

        // --- 4. CORE LOOP ROUTINE ---
        function updateClock() {
            try {
                let now = new Date();

                const dateEl = document.getElementById('current-date');
                const timeEl = document.getElementById('current-time');
                const miniStatusEl = document.getElementById('mini-status');
                
                const timeNoSecs = now.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();

                if (dateEl && timeEl) {
                    const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    dateEl.textContent = now.toLocaleDateString('en-AU', dateOptions);
                    timeEl.textContent = now.toLocaleTimeString('en-AU', { hour12: false });
                }

                const dayOfWeek = now.getDay();
                const isHoliday = isSchoolHoliday(now);
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

                const holidayMsg = document.getElementById('holiday-message');
                const weekendMsg = document.getElementById('weekend-message');
                const activeTimer = document.getElementById('active-timer');
                const scheduleTable = document.getElementById('schedule-table');

                if (isHoliday || isWeekend) {
                    if (miniStatusEl) miniStatusEl.classList.add('hidden');
                    document.title = timeNoSecs; 
                } else {
                    if (miniStatusEl) miniStatusEl.classList.remove('hidden');
                }

                if (isHoliday) {
                    holidayMsg.classList.remove('hidden');
                    activeTimer.classList.add('hidden');
                    scheduleTable.classList.add('opacity-40');
                } else {
                    holidayMsg.classList.add('hidden');
                    scheduleTable.classList.remove('opacity-40');
                }

                if (isWeekend && !isHoliday) {
                    weekendMsg.classList.remove('hidden');
                    activeTimer.classList.add('hidden');
                } else {
                    weekendMsg.classList.add('hidden');
                    if (!isHoliday) {
                        activeTimer.classList.remove('hidden');
                    }
                }

                const todaySchedule = schedules[dayOfWeek];
                if (todaySchedule) {
                    const activeSchedule = todaySchedule.data;

                    activeSchedule.forEach(function(p) {
                        const row = document.getElementById('row-' + p.id);
                        if (row) row.classList.remove('active-period');
                    });

                    document.getElementById('schedule-type-badge').textContent = todaySchedule.name;

                    if (!isHoliday && !isWeekend) {
                        let currentPeriod = null;
                        let timeRemainingSecs = 0;
                        let periodStartObj = null;
                        let periodEndObj = null;

                        const dayStart = parseTime(activeSchedule[1].start, now); 
                        const dayEnd = parseTime(activeSchedule[activeSchedule.length - 1].start, now); 

                        let miniStatusText = "Break";
                        const progressContainer = document.getElementById('progress-container');

                        if (now < dayStart) {
                            document.getElementById('current-period-text').textContent = "School hasn't started yet.";
                            document.getElementById('countdown-display').textContent = "--:-- remaining";
                            if (progressContainer) progressContainer.classList.add('hidden');
                            miniStatusText = "Starts soon";
                            document.title = "[Starts soon] " + timeNoSecs;
                        } else if (now >= dayEnd) {
                            document.getElementById('current-period-text').textContent = "School is over for the day!";
                            document.getElementById('countdown-display').textContent = "--:-- remaining";
                            if (progressContainer) progressContainer.classList.add('hidden');
                            miniStatusText = "School's out";
                            document.title = timeNoSecs;
                        } else {
                            // Find active period
                            for (let i = 0; i < activeSchedule.length; i++) {
                                const p = activeSchedule[i];
                                if (p.isPoint) continue;

                                const pStart = parseTime(p.start, now);
                                const pEnd = parseTime(p.end, now);

                                if (now >= pStart && now < pEnd) {
                                    currentPeriod = p;
                                    periodStartObj = pStart;
                                    periodEndObj = pEnd;
                                    timeRemainingSecs = Math.ceil((pEnd - now) / 1000);
                                    break;
                                }
                            }

                            if (currentPeriod) {
                                if (currentViewingDay === dayOfWeek) {
                                    const activeRow = document.getElementById('row-' + currentPeriod.id);
                                    if (activeRow) activeRow.classList.add('active-period');
                                }

                                // Fetch custom name for titles & displays
                                const activeCustomName = localStorage.getItem('custom_subject_' + currentPeriod.id) || currentPeriod.name;

                                document.getElementById('current-period-text').textContent = "Currently in: " + activeCustomName;
                                
                                const mins = Math.floor(timeRemainingSecs / 60);
                                const secs = timeRemainingSecs % 60;
                                const strMins = mins < 10 ? '0' + mins : mins;
                                const strSecs = secs < 10 ? '0' + secs : secs;
                                document.getElementById('countdown-display').textContent = strMins + ":" + strSecs + " remaining";
                                
                                // FEATURE 2: Update Visual Progress Bar
                                if (progressContainer) {
                                    progressContainer.classList.remove('hidden');
                                    const totalSecs = (periodEndObj - periodStartObj) / 1000;
                                    const elapsedSecs = (now - periodStartObj) / 1000;
                                    const progressPercent = Math.min(100, Math.max(0, (elapsedSecs / totalSecs) * 100));
                                    
                                    const progressBar = document.getElementById('progress-bar');
                                    progressBar.style.width = progressPercent + '%';
                                    
                                    const remainingPercent = 100 - progressPercent;
                                    if (remainingPercent > 50) {
                                        progressBar.className = "bg-green-500 h-3 rounded-full transition-all duration-1000 ease-linear";
                                    } else if (remainingPercent > 20) {
                                        progressBar.className = "bg-yellow-500 h-3 rounded-full transition-all duration-1000 ease-linear";
                                    } else {
                                        progressBar.className = "bg-red-500 h-3 rounded-full transition-all duration-1000 ease-linear";
                                    }
                                }

                                miniStatusText = mins + "m left";
                                document.title = "[" + mins + "m left] " + timeNoSecs;

                                const warningInput = document.getElementById('warning-mins');
                                const warningTriggerMins = warningInput ? parseInt(warningInput.value) : 5;
                                
                                if (lastNotifiedPeriod !== currentPeriod.id && timeRemainingSecs > warningTriggerMins * 60) {
                                    lastNotifiedPeriod = null; 
                                }
                                if (timeRemainingSecs === warningTriggerMins * 60 && lastNotifiedPeriod !== currentPeriod.id) {
                                    triggerNotification(activeCustomName, warningTriggerMins);
                                    lastNotifiedPeriod = currentPeriod.id;
                                }
                            } else {
                                document.getElementById('current-period-text').textContent = "Break / Class Transitions";
                                document.getElementById('countdown-display').textContent = "--:--";
                                if (progressContainer) progressContainer.classList.add('hidden');
                                miniStatusText = "Break";
                                document.title = "[Break] " + timeNoSecs;
                            }
                        }
                        
                        if (miniStatusEl) {
                            miniStatusEl.textContent = timeNoSecs + " • " + miniStatusText;
                        }
                    }
                }
            } catch (err) {
                console.error("Timer encountered a minor hiccup:", err);
            }
        }

        // --- 5. HOMEWORK TRACKER LOGIC ---
        function renderTasks() {
            const list = document.getElementById('task-list');
            if (!list) return;
            list.innerHTML = '';
            
            if (tasks.length === 0) {
                list.innerHTML = '<li class="text-gray-500 text-sm italic">You are all caught up! No tasks assigned.</li>';
                return;
            }

            tasks.forEach(function(task, index) {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-3 bg-gray-50 dark:bg-black border border-gray-200 dark:border-zinc-800 rounded-lg";
                
                const label = document.createElement('label');
                label.className = "flex items-center gap-3 cursor-pointer flex-1";
                
                const checkbox = document.createElement('input');
                checkbox.type = "checkbox";
                checkbox.checked = task.completed;
                checkbox.className = "task-checkbox w-4 h-4 cursor-pointer accent-blue-600 rounded";
                checkbox.onchange = function() {
                    tasks[index].completed = checkbox.checked;
                    localStorage.setItem('baulko_tasks', JSON.stringify(tasks));
                    // Minimal delay to let CSS transition happen before re-rendering
                    setTimeout(renderTasks, 150);
                };
                
                const textSpan = document.createElement('span');
                textSpan.textContent = task.text;
                textSpan.className = "font-medium text-gray-800 dark:text-gray-200 transition-all";
                if(task.completed) {
                    textSpan.classList.add('line-through', 'opacity-50');
                }
                
                label.appendChild(checkbox);
                label.appendChild(textSpan);
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = "🗑️";
                delBtn.className = "opacity-50 hover:opacity-100 transition text-lg px-2";
                delBtn.title = "Delete Task";
                delBtn.onclick = function() {
                    tasks.splice(index, 1);
                    localStorage.setItem('baulko_tasks', JSON.stringify(tasks));
                    renderTasks();
                };
                
                li.appendChild(label);
                li.appendChild(delBtn);
                list.appendChild(li);
            });
        }

        // --- 6. INITIALIZATION ---
        function initializeApp() {
            const themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) {
                themeBtn.addEventListener('click', function() {
                    document.documentElement.classList.toggle('dark');
                });
            }

            const notifyBtn = document.getElementById('notify-btn');
            if (notifyBtn) {
                notifyBtn.addEventListener('click', function() {
                    if (Notification.permission === 'default' || Notification.permission === 'denied') {
                        Notification.requestPermission().then(function(permission) {
                            if (permission === 'granted') {
                                notificationsEnabled = true;
                                notifyBtn.textContent = "Alerts Active ✅";
                                notifyBtn.classList.replace('bg-blue-600', 'bg-green-600');
                                new Notification("Baulko Bell Times", { body: "Your notifications have been configured!" });
                            } else {
                                alert("Please approve notification privileges inside your browser configurations to utilize notifications.");
                            }
                        });
                    }
                });
            }

            // Wire up Homework Tracker Input
            const addTaskBtn = document.getElementById('add-task-btn');
            const taskInput = document.getElementById('task-input');
            if (addTaskBtn && taskInput) {
                addTaskBtn.onclick = function() {
                    if (taskInput.value.trim() !== "") {
                        tasks.push({ text: taskInput.value.trim(), completed: false });
                        taskInput.value = "";
                        localStorage.setItem('baulko_tasks', JSON.stringify(tasks));
                        renderTasks();
                    }
                };
                taskInput.onkeypress = function(e) {
                    if (e.key === 'Enter') addTaskBtn.click();
                };
            }
            renderTasks();

            let currentSystemDay = new Date().getDay();
            if (currentSystemDay === 0 || currentSystemDay === 6) {
                currentSystemDay = 1; 
            }
            renderTable(currentSystemDay);

            function runClock() {
                updateClock();
                const now = new Date();
                const msUntilNextSecond = 1000 - now.getMilliseconds();
                window.setTimeout(runClock, msUntilNextSecond);
            }
            runClock();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }

        // --- 7. OFFLINE SERVICE WORKER ---
        const isLiveWebpage = window.location.protocol.startsWith('http');
        const isSandboxedPreview = window.location.host.includes('usercontent.goog') || window.location.host.includes('artifact');
        
        if ('serviceWorker' in navigator && isLiveWebpage && !isSandboxedPreview) {
            navigator.serviceWorker.register('sw.js')
                .then(function(reg) { console.log('Offline cache helper loaded.'); })
                .catch(function(err) { console.log('Offline caching setup is active.'); });
        }
    </script>
</body>
</html>
